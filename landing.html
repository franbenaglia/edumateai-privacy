<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EduMate AI — Aprende más, estudia mejor</title>
  <meta name="description" content="EduMate AI convierte tus apuntes escaneados en resúmenes, flashcards y quizzes con inteligencia artificial." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #4f46e5;
      --primary-light: #818cf8;
      --primary-dark: #3730a3;
      --secondary: #06b6d4;
      --accent: #f59e0b;
      --bg: #0f172a;
      --bg2: #1e293b;
      --bg3: #334155;
      --text: #f1f5f9;
      --text-muted: #94a3b8;
      --border: #334155;
      --radius: 14px;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    /* NAV */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(15,23,42,0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 24px;
    }

    .nav-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 800;
      font-size: 1.2rem;
      color: var(--text);
      text-decoration: none;
    }

    .nav-brand .logo-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .nav-links a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.9rem;
      padding: 6px 12px;
      border-radius: 8px;
      transition: color 0.2s, background 0.2s;
    }

    .nav-links a:hover { color: var(--text); background: var(--bg2); }

    .lang-btn {
      background: var(--bg2);
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 6px 14px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.85rem;
      font-family: 'Inter', sans-serif;
      transition: all 0.2s;
    }

    .lang-btn:hover { border-color: var(--primary); color: var(--text); }

    /* HERO */
    .hero {
      text-align: center;
      padding: 100px 24px 80px;
      max-width: 860px;
      margin: 0 auto;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(79,70,229,0.15);
      border: 1px solid rgba(79,70,229,0.4);
      color: var(--primary-light);
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 500;
      margin-bottom: 28px;
    }

    .hero h1 {
      font-size: clamp(2.2rem, 5vw, 3.8rem);
      font-weight: 800;
      line-height: 1.15;
      margin-bottom: 20px;
      background: linear-gradient(135deg, #f1f5f9 30%, var(--primary-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero p {
      font-size: 1.15rem;
      color: var(--text-muted);
      max-width: 580px;
      margin: 0 auto 40px;
    }

    .hero-cta {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--primary);
      color: #fff;
      padding: 14px 28px;
      border-radius: 12px;
      font-weight: 600;
      font-size: 1rem;
      text-decoration: none;
      transition: background 0.2s, transform 0.1s;
    }

    .btn-primary:hover { background: var(--primary-dark); transform: translateY(-1px); }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--bg2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 14px 28px;
      border-radius: 12px;
      font-weight: 600;
      font-size: 1rem;
      text-decoration: none;
      transition: border-color 0.2s, transform 0.1s;
    }

    .btn-secondary:hover { border-color: var(--primary-light); transform: translateY(-1px); }

    /* STATS */
    .stats {
      display: flex;
      justify-content: center;
      gap: 48px;
      flex-wrap: wrap;
      padding: 48px 24px;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      max-width: 860px;
      margin: 0 auto;
    }

    .stat { text-align: center; }
    .stat-value { font-size: 2rem; font-weight: 800; color: var(--primary-light); }
    .stat-label { font-size: 0.85rem; color: var(--text-muted); margin-top: 4px; }

    /* SECTIONS */
    section { padding: 80px 24px; max-width: 1100px; margin: 0 auto; }

    .section-label {
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--primary-light);
      margin-bottom: 12px;
    }

    .section-title {
      font-size: clamp(1.6rem, 3vw, 2.4rem);
      font-weight: 800;
      margin-bottom: 14px;
      line-height: 1.2;
    }

    .section-subtitle {
      color: var(--text-muted);
      font-size: 1.05rem;
      max-width: 540px;
      margin-bottom: 56px;
    }

    /* FEATURES GRID */
    .features-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
    }

    .feature-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      transition: border-color 0.2s, transform 0.2s;
    }

    .feature-card:hover { border-color: var(--primary); transform: translateY(-2px); }

    .feature-icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      margin-bottom: 18px;
    }

    .feature-card h3 { font-size: 1.05rem; font-weight: 700; margin-bottom: 8px; }
    .feature-card p { font-size: 0.9rem; color: var(--text-muted); line-height: 1.6; }

    /* HOW IT WORKS */
    .steps {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 24px;
    }

    .step {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 12px;
    }

    .step-number {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 0.9rem;
    }

    .step h3 { font-size: 1rem; font-weight: 700; }
    .step p { font-size: 0.88rem; color: var(--text-muted); }

    /* PRICING */
    .pricing-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 20px;
      margin-top: 16px;
    }

    .pricing-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px 28px;
      position: relative;
      transition: border-color 0.2s;
    }

    .pricing-card.featured {
      border-color: var(--primary);
      background: linear-gradient(160deg, rgba(79,70,229,0.12), var(--bg2));
    }

    .pricing-badge {
      position: absolute;
      top: -12px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--primary);
      color: #fff;
      font-size: 0.75rem;
      font-weight: 700;
      padding: 4px 14px;
      border-radius: 20px;
      white-space: nowrap;
    }

    .pricing-card h3 { font-size: 1.1rem; font-weight: 700; margin-bottom: 6px; }
    .pricing-card .price { font-size: 2rem; font-weight: 800; color: var(--primary-light); margin: 12px 0 4px; }
    .pricing-card .price span { font-size: 1rem; font-weight: 400; color: var(--text-muted); }
    .pricing-card .credits { font-size: 0.85rem; color: var(--accent); font-weight: 600; margin-bottom: 20px; }

    .pricing-card ul { list-style: none; display: flex; flex-direction: column; gap: 10px; }
    .pricing-card ul li { font-size: 0.88rem; color: var(--text-muted); display: flex; gap: 8px; align-items: flex-start; }
    .pricing-card ul li::before { content: "✓"; color: #22c55e; font-weight: 700; flex-shrink: 0; }

    .free-tier-box {
      background: linear-gradient(135deg, rgba(6,182,212,0.1), rgba(79,70,229,0.1));
      border: 1px solid rgba(6,182,212,0.3);
      border-radius: var(--radius);
      padding: 32px;
      margin-bottom: 40px;
    }

    .free-tier-box h3 { font-size: 1.2rem; font-weight: 700; margin-bottom: 8px; color: var(--secondary); }
    .free-tier-box p { color: var(--text-muted); font-size: 0.95rem; }

    .credit-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 28px;
      font-size: 0.9rem;
    }

    .credit-table th {
      text-align: left;
      padding: 10px 16px;
      background: var(--bg3);
      color: var(--text-muted);
      font-weight: 600;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .credit-table th:first-child { border-radius: 8px 0 0 8px; }
    .credit-table th:last-child { border-radius: 0 8px 8px 0; }

    .credit-table td {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      color: var(--text);
    }

    .credit-table td .badge {
      display: inline-block;
      background: rgba(79,70,229,0.2);
      color: var(--primary-light);
      padding: 2px 10px;
      border-radius: 20px;
      font-weight: 700;
      font-size: 0.82rem;
    }

    /* CONTACT */
    .contact-box {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 48px;
      text-align: center;
      max-width: 600px;
      margin: 0 auto;
    }

    .contact-box h2 { font-size: 1.8rem; font-weight: 800; margin-bottom: 12px; }
    .contact-box p { color: var(--text-muted); margin-bottom: 28px; }

    .contact-box a.email-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 14px 24px;
      border-radius: 10px;
      font-weight: 600;
      text-decoration: none;
      transition: border-color 0.2s;
    }

    .contact-box a.email-link:hover { border-color: var(--primary-light); }

    /* FOOTER */
    footer {
      border-top: 1px solid var(--border);
      padding: 32px 24px;
      text-align: center;
      color: var(--text-muted);
      font-size: 0.85rem;
    }

    footer a { color: var(--text-muted); text-decoration: none; }
    footer a:hover { color: var(--text); }

    /* RESPONSIVE */
    @media (max-width: 640px) {
      nav { padding: 12px 16px; }
      .nav-links a { display: none; }
      .hero { padding: 60px 16px 60px; }
      .stats { gap: 28px; }
      section { padding: 60px 16px; }
      .contact-box { padding: 32px 20px; }
    }
  </style>
</head>

    let currentLang = 'es';

    function applyLang(lang) {
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (i18n[lang][key]) el.textContent = i18n[lang][key];
      });
      document.documentElement.lang = lang;
      document.getElementById('lang-toggle').textContent = lang === 'es' ? 'EN' : 'ES';
      document.title = lang === 'es'
        ? 'EduMate AI — Aprende más, estudia mejor'
        : 'EduMate AI — Study smarter, not harder';
    }

    function toggleLang() {
      currentLang = currentLang === 'es' ? 'en' : 'es';
      applyLang(currentLang);
    }

    // Auto-detect browser language
    const browserLang = navigator.language?.startsWith('es') ? 'es' : 'en';
    currentLang = browserLang;
    applyLang(currentLang);
